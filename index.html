<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЭПШТЕЙН v5.1.1 · SECURITY UPDATE</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; transition: 0.3s; }
        body { background: #03060c; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; margin: 0; padding: 10px; color: white; overflow: hidden; }
        .game-container { background: #1a1f2a; border-radius: 30px; max-width: 420px; width: 100%; padding: 15px; border: 3px solid #7a6a3a; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.6); }
        .player-stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .characters { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; padding: 5px; }
        .char-btn { background: #2a3241; border: 2px solid #444; border-radius: 15px; padding: 12px; cursor: pointer; border-left: 8px solid; text-align: left; }
        .char-btn.locked { opacity: 0.4; filter: grayscale(1); }
        .event-log { background: rgba(0,0,0,0.9); border-radius: 15px; padding: 15px; min-height: 80px; margin: 10px 0; border: 1px solid #444; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; }
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .act-btn { border: none; font-size: 0.9rem; padding: 12px; border-radius: 40px; color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-normal { background: linear-gradient(#b34e2e, #5a1e0c); }
        .btn-boss { background: linear-gradient(#c0392b, #8e44ad); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .progress-fill { height: 100%; background: #00ffcc; width: 0%; transition: 0.3s; }
        .btn-ui { background: rgba(255,255,255,0.1); border: 1px solid #666; padding: 8px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.7rem; margin: 2px; }
        .hidden { display: none !important; }
        #banScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #700; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        input { background: #000; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 10px; text-align: center; width: 100%; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="banScreen" class="hidden">
    <h1 style="font-size: 2.5rem;">TERMINATED</h1>
    <p>SYSTEM LOCK 676767</p>
    <input type="text" id="unbanCode" placeholder="DECRYPT KEY">
    <button class="act-btn btn-normal" style="width:200px" onclick="checkUnban()">RESTORE</button>
</div>

<div id="mainBox" class="game-container">
    <div class="player-stats">
        <div>💎 <span id="playerGems">0</span></div>
        <div id="locName" style="font-weight:bold; color:#00ffcc; cursor:pointer;" onclick="toggleDebug()">МЕНЮ</div>
        <div>LVL: <span id="playerLvl">1</span></div>
    </div>

    <div id="characterSelect">
        <div class="characters" id="charList"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div id="bossUI" class="hidden" style="text-align:center; margin-bottom:10px; color:#f55;">
            <div style="font-weight:bold;">👹 БОСС: ЭМИТЕНТ</div>
            <div class="progress-bar"><div id="bossFill" class="progress-fill" style="background:#f55; width:100%;"></div></div>
            <div id="bossHpLabel">500/500 HP</div>
        </div>
        <div class="progress-bar" id="tripBar"><div id="goalFill" class="progress-fill"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
            <div id="livesDisplay" style="color:#f55">❤️ 0</div>
            <div id="turnsDisplay">0/300</div>
            <div id="coinsValue" style="color:#fd6">🪙 0</div>
        </div>
        <div class="event-log"><div id="eventMessage">Безопасность обновлена.</div></div>
        
        <div id="normalActions" class="action-grid">
            <button id="ultBtn" class="act-btn btn-ult" style="background: linear-gradient(#f1c40f, #e67e22); color: #000;" onclick="useUltimate()" disabled>⚡ УЛЬТА (0%)</button>
            <button class="act-btn btn-normal" onclick="playTurn('normal')">🍖 ОБЫЧНО</button>
            <button class="act-btn btn-normal" style="background: linear-gradient(#4e2eb3, #1e0c5a);" onclick="playTurn('risk')">🎲 РИСК</button>
            <button class="act-btn btn-normal" style="background: #333;" onclick="playTurn('safe')">🛡️ СЕЙФ</button>
        </div>

        <div id="bossActions" class="action-grid hidden">
            <button class="act-btn btn-boss" onclick="bossHit('heavy')">💥 УДАР</button>
            <button class="act-btn btn-normal" onclick="bossHit('heal')">💊 ЛЕЧЕНИЕ</button>
        </div>
        
        <div id="shopContainer" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
    </div>
</div>

<div id="debugPanel" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; background:#1a1f2a; padding:30px; border-radius:20px; border:2px solid #00ffcc; width:80%;">
        <h3>CONSOLE</h3>
        <input type="text" id="debugCode" placeholder="ENTER CODE">
        <button class="act-btn btn-normal" style="width:100%;" onclick="verifyCode()">EXECUTE</button>
        <button class="btn-ui" style="display:block; width:100%; margin-top:10px;" onclick="toggleDebug()">EXIT</button>
    </div>
</div>

<div id="endScreen" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:3000;">
    <div style="background:#1a1f2a; padding:30px; border-radius:25px; border:3px solid #ffd966; text-align:center; width:80%;">
        <h1 id="endTitle"></h1>
        <p id="endStats"></p>
        <button class="act-btn btn-normal" style="width:100%" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    const zones = [{ n: "🔒 ТЮРЬМА", d: 2 }, { n: "🌲 ЛЕС", d: 3 }, { n: "🏙️ ГОРОД", d: 4 }, { n: "🌵 ПУСТЫНЯ", d: 6 }, { n: "🛥️ ЯХТА", d: 8 }, { n: "🧪 ЛАБОРАТОРИЯ", d: 10 }, { n: "🕳️ ПЕЩЕРЫ", d: 12 }, { n: "🌊 ОКЕАН", d: 15 }, { n: "🏮 НЕОН СИТИ", d: 20 }, { n: "🏝️ ОСТРОВ", d: 25 }];

    const charData = {
        epstein: { n: "Эпштейн", hp: 5, c: "#ffd966", cost: 0 },
        skuf: { n: "Скуф", hp: 12, c: "#795548", cost: 0 },
        musk: { n: "Маск", hp: 5, c: "#00bcd4", cost: 0 },
        kuplinov: { n: "Куплинов", hp: 6, c: "#f44336", cost: 100 },
        gaben: { n: "Габен", hp: 6, c: "#3f51b5", cost: 70 },
        papich: { n: "Папич", hp: 6, c: "#ff9800", cost: 500 },
        bandera: { n: "Бандера", hp: 100, c: "#000", cost: 0, secret: true },
        framekid: { n: "framekid", hp: 1e9, c: "#00ffcc", cost: 0, secret: true, coins: 1e7, god: true },
        quadors: { n: "quadors", hp: 1, c: "#ff00ff", secret: true, god: true },
        developer: { n: "developer", hp: 1e9, c: "#fff", secret: true, coins: 1e12, god: true }
    };

    let pState = { gems: 0, unlocked: ['epstein', 'skuf', 'musk'], banned: false, lvl: 1 };
    let cur = { active: false, id: '', hp: 0, coins: 0, turns: 0, ultCharge: 0, god: false, isBoss: false, bossHp: 500 };

    function save() { localStorage.setItem('ep_5.1.1', JSON.stringify(pState)); }
    function load() {
        const d = localStorage.getItem('ep_5.1.1');
        if(d) pState = JSON.parse(d);
        if(pState.banned) document.getElementById('banScreen').classList.remove('hidden');
        document.getElementById('playerGems').innerText = pState.gems;
        document.getElementById('playerLvl').innerText = pState.lvl;
        renderList();
    }

    function renderList() {
        const list = document.getElementById('charList'); list.innerHTML = '';
        for(let id in charData) {
            const c = charData[id]; const locked = !pState.unlocked.includes(id);
            if(c.secret && locked) continue;
            const d = document.createElement('div'); d.className = `char-btn ${locked ? 'locked' : ''}`;
            d.style.borderColor = c.c;
            d.innerHTML = `<b>${c.n}</b> | HP: ${c.god ? '∞' : c.hp}<br><small>${locked ? c.cost+'💎' : 'Разблокирован'}</small>`;
            d.onclick = () => locked ? unlock(id) : start(id);
            list.appendChild(d);
        }
    }

    function verifyCode() {
        const code = document.getElementById('debugCode').value.trim();
        if(code === '676767') { pState.banned = true; save(); location.reload(); }
        else if(code === '888867') { 
            pState.gems += 50000; 
            pState.unlocked = Object.keys(charData); 
            alert("ALL CHARACTERS UNLOCKED!"); 
        }
        else if(code === 'devmode') { 
            pState.gems += 100000000; 
            if(!pState.unlocked.includes('developer')) pState.unlocked.push('developer'); 
            alert("+100M GEMS & DEV UNLOCKED");
        }
        else if(code === '1488') { unlockSecret('bandera'); }
        else if(code === '886767') { unlockSecret('framekid'); }
        else if(code === 'miside') { unlockSecret('quadors'); }
        save(); load(); toggleDebug();
    }

    function unlockSecret(id) { if(!pState.unlocked.includes(id)) pState.unlocked.push(id); }
    function checkUnban() { if(document.getElementById('unbanCode').value.trim() === '8814') { pState.banned = false; save(); location.reload(); } }
    function unlock(id) { if(pState.gems >= charData[id].cost) { pState.gems -= charData[id].cost; pState.unlocked.push(id); save(); load(); } }

    function start(id) {
        const c = charData[id];
        cur = { active: true, id, hp: c.hp, coins: c.coins || (id==='musk'?150:0), turns: 0, ultCharge: 0, god: c.god || false, isBoss: false, bossHp: 500 };
        document.getElementById('characterSelect').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        gameUI();
    }

    function playTurn(mode) {
        if(!cur.active || cur.isBoss) return;
        cur.turns++; cur.ultCharge = Math.min(100, cur.ultCharge + 10);
        const z = zones[Math.min(9, Math.floor(cur.turns / 30))];
        document.getElementById('locName').innerText = z.n;
        if(mode === 'safe') { if(!cur.god) cur.coins -= 15; }
        else {
            let m = (mode === 'risk' ? 3.0 : 1.0);
            if(Math.random() < 0.5) { cur.coins += Math.ceil(20 * m); log("💰 Нашел монеты"); }
            else if(!cur.god) { cur.hp -= Math.ceil(z.d * m); log("💥 Получил урон", "#f55"); }
        }
        if(cur.hp <= 0 && !cur.god) endGame("💀 GAME OVER", 10);
        if(cur.turns >= 300) { cur.isBoss = true; document.getElementById('bossUI').classList.remove('hidden'); document.getElementById('tripBar').classList.add('hidden'); document.getElementById('normalActions').classList.add('hidden'); document.getElementById('bossActions').classList.remove('hidden'); }
        gameUI();
    }

    function bossHit(type) {
        cur.bossHp -= (type === 'heavy' ? 50 : 20);
        if(!cur.god) cur.hp -= 20;
        document.getElementById('bossFill').style.width = (cur.bossHp / 5) + "%";
        document.getElementById('bossHpLabel').innerText = `${cur.bossHp}/500 HP`;
        if(cur.bossHp <= 0) endGame("🏆 BOSS DEFEATED", 2000);
        if(cur.hp <= 0 && !cur.god) endGame("💀 BOSS KILLED YOU", 50);
        gameUI();
    }

    function useUltimate() { if(cur.ultCharge >= 100) { cur.ultCharge = 0; if(cur.isBoss) cur.bossHp -= 100; log("✨ ULTIMATE!"); gameUI(); } }

    function renderShop() {
        const s = document.getElementById('shopContainer'); s.innerHTML = '';
        let hVal = 1, hPrice = 40;
        if(cur.id === 'bandera') { hVal = 10; hPrice = 1; }
        if(cur.id === 'framekid' || cur.id === 'developer') { hVal = 1e11; hPrice = 0; }
        const b = document.createElement('button'); b.className='btn-ui'; b.innerText=`+${hVal}❤️ (${hPrice}🪙)`;
        b.onclick=()=>{if(cur.coins>=hPrice){cur.coins-=hPrice; if(!cur.god)cur.hp+=hVal; gameUI();}};
        s.appendChild(b);
    }

    function gameUI() {
        let hpD = cur.god && !['framekid','developer'].includes(cur.id) ? "∞" : (cur.hp > 1e6 ? cur.hp.toExponential(1) : cur.hp);
        document.getElementById('livesDisplay').innerText = "❤️ " + hpD;
        document.getElementById('coinsValue').innerText = "🪙 " + (cur.coins > 1e9 ? cur.coins.toExponential(1) : Math.floor(cur.coins));
        document.getElementById('turnsDisplay').innerText = cur.isBoss ? "BOSS" : `${cur.turns}/300`;
        document.getElementById('goalFill').style.width = (cur.turns / 3) + "%";
        document.getElementById('ultBtn').disabled = cur.ultCharge < 100;
        renderShop();
    }

    function log(m, c="#fff") { document.getElementById('eventMessage').innerText = m; document.getElementById('eventMessage').style.color = c; }
    function toggleDebug() { document.getElementById('debugPanel').classList.toggle('hidden'); }
    function endGame(t, g) { cur.active = false; pState.gems += g; pState.lvl++; save(); document.getElementById('endScreen').classList.remove('hidden'); document.getElementById('endTitle').innerText = t; }
    load();
</script>
</body>
</html>
