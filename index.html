<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЭПШТЕЙН v4.7 · FRAME KNOWLEDGE</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; transition: 0.4s; }
        body { background: #03060c; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; margin: 0; padding: 10px; color: white; overflow: hidden; }
        .game-container { background: #1a1f2a; border-radius: 30px; max-width: 420px; width: 100%; padding: 15px; border: 3px solid #7a6a3a; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.6); }
        .night { filter: brightness(0.5) contrast(1.3); }
        .player-stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .characters { display: flex; flex-direction: column; gap: 8px; max-height: 55vh; overflow-y: auto; padding: 5px; }
        .char-btn { background: #2a3241; border: 2px solid #444; border-radius: 15px; padding: 12px; cursor: pointer; border-left: 8px solid; }
        .char-btn.locked { opacity: 0.4; filter: grayscale(1); }
        .event-log { background: rgba(0,0,0,0.9); border-radius: 15px; padding: 15px; min-height: 100px; margin: 10px 0; border: 1px solid #444; display: flex; align-items: center; justify-content: center; text-align: center; }
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .act-btn { border: none; font-size: 1rem; padding: 14px; border-radius: 40px; color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-normal { background: linear-gradient(#b34e2e, #5a1e0c); }
        .btn-risk { background: linear-gradient(#4e2eb3, #1e0c5a); }
        .btn-safe { background: #333; border: 1px solid #555; }
        .btn-ult { background: linear-gradient(#f1c40f, #e67e22); color: #000; box-shadow: 0 0 15px #f1c40f; }
        .btn-ult:disabled { opacity: 0.3; filter: grayscale(1); box-shadow: none; }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .progress-fill { height: 100%; background: #00ffcc; width: 0%; transition: 0.3s; }
        .btn-ui { background: rgba(255,255,255,0.1); border: 1px solid #666; padding: 8px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.7rem; margin: 2px; flex: 1; }
        .hidden { display: none !important; }
        input#debugCode { background: #000; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 10px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div id="mainBox" class="game-container">
    <div class="player-stats">
        <div>💎 <span id="playerGems">0</span></div>
        <div id="locName" style="font-weight:bold; color:#00ffcc; cursor:pointer;" onclick="toggleDebug()">МЕНЮ</div>
        <div>LVL: 🆙</div>
    </div>

    <div id="characterSelect">
        <div class="characters" id="charList"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div class="progress-bar"><div id="goalFill" class="progress-fill"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
            <div id="livesDisplay" style="color:#f55"></div>
            <div id="turnsDisplay">0/300</div>
            <div id="coinsValue" style="color:#fd6">🪙 0</div>
        </div>
        <div class="event-log">
            <div id="weatherLabel" style="font-size:0.7rem; color:#888; margin-bottom:5px;">ДЕНЬ</div>
            <div id="eventMessage">Готов к деструкции?</div>
        </div>
        <div class="action-grid">
            <button id="ultBtn" class="act-btn btn-ult" onclick="useUltimate()" disabled>⚡ УЛЬТА</button>
            <button class="act-btn btn-normal" onclick="playTurn('normal')">🍖 ОБЫЧНО</button>
            <button class="act-btn btn-risk" onclick="playTurn('risk')">🎲 РИСК</button>
            <button class="act-btn btn-safe" onclick="playTurn('safe')">🛡️ СЕЙФ</button>
        </div>
        <div id="shopContainer" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
    </div>
</div>

<div id="debugPanel" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; background:#1a1f2a; padding:30px; border-radius:20px; border:2px solid #00ffcc; width:80%;">
        <h3>SECRET ACCESS</h3>
        <input type="text" id="debugCode" placeholder="КОД"><br><br>
        <button class="act-btn btn-normal" style="width:100%;" onclick="verifyCode()">ENTER</button>
        <button class="btn-ui" style="display:block; width:100%; margin-top:10px;" onclick="toggleDebug()">CLOSE</button>
    </div>
</div>

<div id="endScreen" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:3000;">
    <div style="background:#1a1f2a; padding:30px; border-radius:25px; border:3px solid #ffd966; text-align:center; width:80%;">
        <h1 id="endTitle"></h1>
        <button class="act-btn btn-normal" style="width:100%" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    const zones = [{ n: "🔒 ТЮРЬМА", d: 2 }, { n: "🌲 ЛЕС", d: 3 }, { n: "🏙️ ГОРОД", d: 4 }, { n: "🌵 ПУСТЫНЯ", d: 6 }, { n: "🛥️ ЯХТА", d: 8 }, { n: "🧪 ЛАБОРАТОРИЯ", d: 10 }, { n: "🕳️ ПЕЩЕРЫ", d: 12 }, { n: "🌊 ОКЕАН", d: 15 }, { n: "🏮 НЕОН СИТИ", d: 20 }, { n: "🏝️ ОСТРОВ", d: 25 }];

    const charData = {
        epstein: { n: "Эпштейн", hp: 5, b: "Баланс", c: "#ffd966", cost: 0 },
        skuf: { n: "Скуф", hp: 12, b: "Танк", c: "#795548", cost: 0 },
        musk: { n: "Маск", hp: 5, b: "Старт+150", c: "#00bcd4", cost: 0 },
        kuplinov: { n: "Куплинов", hp: 6, b: "Стрим", c: "#f44336", cost: 100 },
        bandera: { n: "Бандера", hp: 100, b: "Спецагент", c: "#000", cost: 0, secret: true },
        framekid: { n: "framekid", hp: 1000000000, b: "DEV MODE", c: "#00ffcc", cost: 0, secret: true, startCoins: 10000000 },
        gaben: { n: "Габен", hp: 6, b: "Скидки", c: "#3f51b5", cost: 70 },
        papich: { n: "Папич", hp: 6, b: "Крит x5", c: "#ff9800", cost: 500 },
        mellstroy: { n: "Мелстрой", hp: 5, b: "Казино", c: "#9c27b0", cost: 500 }
    };

    let pState = { gems: 0, unlocked: ['epstein', 'skuf', 'musk'] };
    let cur = { active: false, id: '', hp: 0, coins: 0, turns: 0, armor: 0, ultCharge: 0, ultActive: 0 };

    function save() { localStorage.setItem('ep_4.7', JSON.stringify(pState)); }
    function load() {
        const d = localStorage.getItem('ep_4.7');
        if(d) pState = JSON.parse(d);
        document.getElementById('playerGems').innerText = pState.gems;
        renderList();
    }

    function renderList() {
        const list = document.getElementById('charList'); list.innerHTML = '';
        for(let id in charData) {
            const c = charData[id]; const locked = !pState.unlocked.includes(id);
            if(c.secret && locked) continue;
            const d = document.createElement('div'); d.className = `char-btn ${locked ? 'locked' : ''}`;
            d.style.borderColor = c.c;
            d.innerHTML = `<b>${c.n}</b><br><small>${c.b}</small>`;
            d.onclick = () => locked ? (c.secret ? null : unlock(id)) : start(id);
            list.appendChild(d);
        }
    }

    function verifyCode() {
        const code = document.getElementById('debugCode').value;
        if(code === '1337') pState.gems += 500;
        else if(code === 'ZE' || code === 'ЗЕ') { cur.hp += 100; cur.coins += 100; }
        else if(code === '1488') { if(!pState.unlocked.includes('bandera')) pState.unlocked.push('bandera'); }
        else if(code === '886767') { if(!pState.unlocked.includes('framekid')) pState.unlocked.push('framekid'); }
        save(); load(); gameUI(); toggleDebug();
    }

    function start(id) {
        const c = charData[id];
        cur = { active: true, id, hp: c.hp, coins: c.startCoins || (id==='musk'?150:0), turns: 0, armor: 0, ultCharge: 0, ultActive: 0 };
        document.getElementById('characterSelect').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        gameUI();
    }

    function playTurn(mode) {
        if(!cur.active) return;
        cur.turns++; cur.ultCharge = Math.min(100, cur.ultCharge + 10);
        const z = zones[Math.min(9, Math.floor(cur.turns / 30))];
        document.getElementById('locName').innerText = z.n;

        if(mode === 'safe' && cur.id !== 'framekid') cur.coins -= 15;
        
        let m = (mode === 'risk' ? 3 : 1);
        if(Math.random() < 0.5) {
            let gain = Math.ceil(15 * m); cur.coins += gain; log(`💰 +${gain}🪙`);
        } else {
            let dmg = Math.max(1, z.d - cur.armor); cur.hp -= dmg; log(`💥 -${dmg}❤️`, "#f55");
        }

        if(cur.hp <= 0) endGame("💀 КОНЕЦ");
        if(cur.turns >= 300) endGame("🏝️ ПОБЕДА!");
        gameUI();
    }

    function renderShop() {
        const s = document.getElementById('shopContainer'); s.innerHTML = '';
        const id = cur.id;
        let hpVal = 1, hpPrice = 40;

        if(id === 'bandera') { hpVal = 10; hpPrice = 1; }
        if(id === 'framekid') { hpVal = 100000000000; hpPrice = 1; }

        const hpBtn = document.createElement('button');
        hpBtn.className='btn-ui'; hpBtn.innerText=`+${hpVal}❤️ (${hpPrice}🪙)`;
        hpBtn.onclick=()=>{if(cur.coins>=hpPrice){cur.coins-=hpPrice; cur.hp+=hpVal; gameUI();}};
        s.appendChild(hpBtn);
    }

    function useUltimate() {
        if(cur.ultCharge < 100) return;
        cur.ultCharge = 0; cur.ultActive = 5; log("✨ УЛЬТА АКТИВНА!"); gameUI();
    }

    function gameUI() {
        let hpDisp = cur.hp;
        if(hpDisp > 1000) hpDisp = (hpDisp).toExponential(2);
        document.getElementById('livesDisplay').innerText = "❤️ " + hpDisp;
        document.getElementById('coinsValue').innerText = "🪙 " + Math.floor(cur.coins);
        document.getElementById('turnsDisplay').innerText = `${cur.turns}/300`;
        document.getElementById('goalFill').style.width = (cur.turns / 3) + "%";
        document.getElementById('ultBtn').disabled = cur.ultCharge < 100;
        renderShop();
    }

    function toggleDebug() { document.getElementById('debugPanel').classList.toggle('hidden'); }
    function log(m, c="#fff") { document.getElementById('eventMessage').innerText = m; document.getElementById('eventMessage').style.color = c; }
    function endGame(t) { cur.active = false; document.getElementById('endScreen').classList.remove('hidden'); document.getElementById('endTitle').innerText = t; }
    load();
</script>
</body>
</html>
