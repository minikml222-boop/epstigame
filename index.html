<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЭПШТЕЙН v4.8.2</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; transition: 0.4s; }
        body { background: #03060c; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; margin: 0; padding: 10px; color: white; overflow: hidden; }
        .game-container { background: #1a1f2a; border-radius: 30px; max-width: 420px; width: 100%; padding: 15px; border: 3px solid #7a6a3a; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.6); }
        .player-stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .characters { display: flex; flex-direction: column; gap: 8px; max-height: 55vh; overflow-y: auto; padding: 5px; }
        .char-btn { background: #2a3241; border: 2px solid #444; border-radius: 15px; padding: 12px; cursor: pointer; border-left: 8px solid; }
        .char-btn.locked { opacity: 0.4; filter: grayscale(1); }
        .event-log { background: rgba(0,0,0,0.9); border-radius: 15px; padding: 15px; min-height: 100px; margin: 10px 0; border: 1px solid #444; display: flex; align-items: center; justify-content: center; text-align: center; }
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .act-btn { border: none; font-size: 1rem; padding: 14px; border-radius: 40px; color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-normal { background: linear-gradient(#b34e2e, #5a1e0c); }
        .btn-ui { background: rgba(255,255,255,0.1); border: 1px solid #666; padding: 8px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.7rem; margin: 2px; flex: 1; }
        .hidden { display: none !important; }
        input#debugCode, input#unbanCode { background: #000; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 10px; text-align: center; width: 100%; font-family: monospace; }
        #banScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #700; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="banScreen" class="hidden">
    <h1 style="font-size: 3rem;">СИСТЕМА ЗАБЛОКИРОВАНА</h1>
    <p>Доступ ограничен. Введите код дешифровки.</p>
    <div style="width: 100%; max-width: 300px;">
        <input type="text" id="unbanCode" placeholder="ДЕШИФРАТОР"><br><br>
        <button class="act-btn btn-normal" style="width:100%" onclick="checkUnban()">UNLOCK</button>
    </div>
</div>

<div id="mainBox" class="game-container">
    <div class="player-stats">
        <div>💎 <span id="playerGems">0</span></div>
        <div id="locName" style="font-weight:bold; color:#00ffcc; cursor:pointer;" onclick="toggleDebug()">МЕНЮ</div>
        <div>LVL: 🆙</div>
    </div>

    <div id="characterSelect">
        <div class="characters" id="charList"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
            <div id="livesDisplay" style="color:#f55"></div>
            <div id="coinsValue" style="color:#fd6">🪙 0</div>
        </div>
        <div class="event-log"><div id="eventMessage">Удачи.</div></div>
        <div class="action-grid">
            <button class="act-btn btn-normal" onclick="playTurn()">ХОД</button>
            <button class="btn-ui" onclick="location.reload()">В МЕНЮ</button>
        </div>
        <div id="shopContainer" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
    </div>
</div>

<div id="debugPanel" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; background:#1a1f2a; padding:30px; border-radius:20px; border:2px solid #00ffcc; width:80%;">
        <h3>ACCESS PANEL</h3>
        <input type="text" id="debugCode" placeholder="CODE"><br><br>
        <button class="act-btn btn-normal" style="width:100%;" onclick="verifyCode()">EXECUTE</button>
        <button class="btn-ui" style="display:block; width:100%; margin-top:10px;" onclick="toggleDebug()">EXIT</button>
    </div>
</div>

<script>
    const charData = {
        epstein: { n: "Эпштейн", hp: 5, b: "Баланс", c: "#ffd966", cost: 0 },
        skuf: { n: "Скуф", hp: 12, b: "Танк", c: "#795548", cost: 0 },
        musk: { n: "Маск", hp: 5, b: "Старт+150", c: "#00bcd4", cost: 0 },
        kuplinov: { n: "Куплинов", hp: 6, b: "Инвиз", c: "#f44336", cost: 100 },
        gaben: { n: "Габен", hp: 6, b: "Скидки", c: "#3f51b5", cost: 70 },
        papich: { n: "Папич", hp: 6, b: "Крит x5", c: "#ff9800", cost: 500 },
        mellstroy: { n: "Мелстрой", hp: 5, b: "Казино", c: "#9c27b0", cost: 500 },
        bandera: { n: "Бандера", hp: 100, b: "Спецагент", c: "#000", cost: 0, secret: true },
        framekid: { n: "framekid", hp: 1e9, b: "GOD", c: "#00ffcc", cost: 0, secret: true, coins: 1e7, god: true },
        quadors: { n: "quadors", hp: 1, b: "IMMORTAL", c: "#ff00ff", cost: 0, secret: true, god: true }
    };

    let pState = { gems: 0, unlocked: ['epstein', 'skuf', 'musk'], banned: false };
    let cur = { active: false, id: '', hp: 0, coins: 0, god: false };

    function save() { localStorage.setItem('ep_4.8.2', JSON.stringify(pState)); }
    function load() {
        const d = localStorage.getItem('ep_4.8.2');
        if(d) pState = JSON.parse(d);
        if(pState.banned) document.getElementById('banScreen').classList.remove('hidden');
        document.getElementById('playerGems').innerText = pState.gems;
        renderList();
    }

    function renderList() {
        const list = document.getElementById('charList'); list.innerHTML = '';
        for(let id in charData) {
            const c = charData[id]; const locked = !pState.unlocked.includes(id);
            if(c.secret && locked) continue;
            const d = document.createElement('div'); d.className = `char-btn ${locked ? 'locked' : ''}`;
            d.style.borderColor = c.c;
            d.innerHTML = `<b>${c.n}</b> | HP: ${c.god ? '∞' : c.hp}<br><small>${locked ? '['+c.cost+'💎]' : c.b}</small>`;
            d.onclick = () => locked ? unlock(id) : start(id);
            list.appendChild(d);
        }
    }

    function verifyCode() {
        const code = document.getElementById('debugCode').value.trim();
        if(code === '676767') { pState.banned = true; save(); location.reload(); }
        else if(code === '1337') { pState.gems += 500; save(); load(); }
        else if(code === '1488') { if(!pState.unlocked.includes('bandera')) pState.unlocked.push('bandera'); }
        else if(code === '886767') { if(!pState.unlocked.includes('framekid')) pState.unlocked.push('framekid'); }
        else if(code === 'miside') { if(!pState.unlocked.includes('quadors')) pState.unlocked.push('quadors'); }
        save(); load(); toggleDebug();
    }

    function checkUnban() {
        if(document.getElementById('unbanCode').value.trim() === '8814') {
            pState.banned = false; save(); location.reload();
        } else { alert("ACCESS DENIED"); }
    }

    function unlock(id) {
        if(pState.gems >= charData[id].cost) {
            pState.gems -= charData[id].cost; pState.unlocked.push(id); save(); load();
        }
    }

    function start(id) {
        const c = charData[id];
        cur = { active: true, id, hp: c.hp, coins: c.coins || (id==='musk'?150:0), god: c.god || false };
        document.getElementById('characterSelect').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        gameUI();
    }

    function playTurn() {
        if(Math.random() < 0.5) {
            let g = Math.ceil(20 * (cur.id==='papich'&&Math.random()<0.1?5:1));
            cur.coins += g; log(`💰 +${g}🪙`);
        } else {
            if(!cur.god) { cur.hp -= 1; log(`💥 -1❤️`, "#f55"); } else { log("🛡️ IMMUNE"); }
        }
        if(cur.hp <= 0 && !cur.god) { alert("КОНЕЦ"); location.reload(); }
        gameUI();
    }

    function renderShop() {
        const s = document.getElementById('shopContainer'); s.innerHTML = '';
        let hVal = 1, hPrice = 40;
        if(cur.id === 'bandera') { hVal = 10; hPrice = 1; }
        if(cur.id === 'framekid') { hVal = 1e11; hPrice = 1; }
        if(cur.god && cur.id !== 'framekid') { hVal = "∞"; hPrice = 0; }

        const b = document.createElement('button'); b.className='btn-ui'; b.innerText=`+${hVal}❤️ (${hPrice}🪙)`;
        b.onclick=()=>{if(cur.coins>=hPrice){cur.coins-=hPrice; if(!cur.god)cur.hp+=hVal; gameUI();}};
        s.appendChild(b);
    }

    function gameUI() {
        let hpDisp = cur.hp;
        if(cur.god && cur.id !== 'framekid') hpDisp = "∞";
        else if(hpDisp > 10000) hpDisp = hpDisp.toExponential(1);
        document.getElementById('livesDisplay').innerText = "❤️ " + hpDisp;
        document.getElementById('coinsValue').innerText = "🪙 " + Math.floor(cur.coins);
        renderShop();
    }

    function toggleDebug() { document.getElementById('debugPanel').classList.toggle('hidden'); }
    function log(m, c="#fff") { document.getElementById('eventMessage').innerText = m; document.getElementById('eventMessage').style.color = c; }
    load();
</script>
</body>
</html>
