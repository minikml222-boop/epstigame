<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЭПШТЕЙН: RARITY UPDATE</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #03060c; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: monospace; margin: 0; padding: 10px; color: white; }
        .game-container { background: #1a1f2a; border-radius: 30px; max-width: 450px; width: 100%; padding: 15px; border: 2px solid #7a6a3a; text-align: center; }
        .player-stats { display: flex; justify-content: space-around; background: #000; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #ffd966; }
        
        #cheatConsole { background: #000; border: 2px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        #cheatConsole input { background: #111; border: 1px solid #333; color: #0f0; padding: 10px; width: 100%; text-align: center; margin-bottom: 10px; outline: none; }
        
        /* РЕДКОСТИ */
        .rarity-common { border-color: #888 !important; color: #ccc; }
        .rarity-rare { border-color: #3498db !important; color: #3498db; }
        .rarity-epic { border-color: #9b59b6 !important; color: #9b59b6; }
        .rarity-legendary { border-color: #f1c40f !important; color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }

        .characters { display: flex; flex-direction: column; gap: 8px; max-height: 40vh; overflow-y: auto; margin-top: 10px; }
        .char-btn { background: #2a2f3a; border: 2px solid #444; border-radius: 15px; padding: 12px; cursor: pointer; text-align: left; display: flex; align-items: center; position: relative; }
        .char-btn.locked { opacity: 0.5; filter: grayscale(1); }
        .lock-badge { position: absolute; right: 10px; background: #fff; color: #000; padding: 2px 6px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        
        .buff-section { background: #22251a; padding: 10px; border-radius: 15px; margin-top: 10px; border: 1px dashed #7a6a3a; }
        .buff-btn { background: #3a3a2a; border: 1px solid #ffd966; padding: 6px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.7rem; margin: 2px; }

        .event-log { background: #000; border-radius: 15px; padding: 15px; min-height: 100px; margin: 10px 0; border: 1px solid #444; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 10px; }
        .act-btn { border: none; font-size: 1.1rem; padding: 14px; border-radius: 40px; color: #ffefc0; cursor: pointer; font-weight: bold; }
        .btn-normal { background: linear-gradient(#b34e2e, #5a1e0c); box-shadow: 0 4px 0 #300; }
        .btn-risk { background: linear-gradient(#4e2eb3, #1e0c5a); box-shadow: 0 4px 0 #100030; }
        .btn-safe { background: linear-gradient(#2e8b57, #1b4d32); box-shadow: 0 4px 0 #0a2010; }
        
        .btn-ui { background: #3a3a2a; border: none; padding: 8px; border-radius: 10px; color: white; cursor: pointer; margin: 3px; font-size: 0.75rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="player-stats">
        <div id="secretTrigger">УРОВЕНЬ: <span id="playerLvl">1</span></div>
        <div>💎 <span id="playerGems">0</span></div>
    </div>

    <div id="cheatConsole" class="hidden">
        <div id="codeEntry">
            <input type="password" id="cheatCodeInput" placeholder="ACCESS CODE">
            <button class="btn-ui" style="width: 100%" onclick="checkCheatCode()">VERIFY</button>
        </div>
        <div id="cheatMenu" class="hidden">
            <div class="cheat-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="btn-ui" onclick="addCheat('gem')">+500 💎</button>
                <button class="btn-ui" onclick="addCheat('lvl')">+20 LVL</button>
                <button class="btn-ui" onclick="addCheat('unlock')">ALL CHARS</button>
                <button class="btn-ui" onclick="addCheat('god')">GOD MODE</button>
            </div>
        </div>
    </div>

    <div id="characterSelect">
        <div class="buff-section">
            <button class="buff-btn" onclick="buyBuff('hp')">❤️ +1 HP</button>
            <button class="buff-btn" onclick="buyBuff('coin')">🪙 +1 COIN</button>
            <div style="font-size: 0.6rem; color: #999; margin-top: 4px;">БОНУСЫ: ❤️<span id="bHP">0</span> 🪙<span id="bCoin">0</span></div>
        </div>
        <div class="characters" id="charList"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold;">
            <div id="livesDisplay" style="color: #f55;"></div>
            <div style="color: #fd6;">🪙 <span id="coinsValue">0</span></div>
        </div>
        <div class="event-log" id="eventMessage"></div>
        
        <div class="action-grid" id="actionControls">
            <button class="act-btn btn-normal" onclick="playTurn('normal')">🍖 ОБЫЧНО</button>
            <button class="act-btn btn-risk" onclick="playTurn('risk')">🎲 РИСК (x2)</button>
            <button class="act-btn btn-safe" onclick="playTurn('safe')">🛡️ БЕЗОПАСНО</button>
        </div>

        <button id="resurrectBtn" class="act-btn btn-normal hidden" style="width: 100%; background: #444;" onclick="resurrect()">🔄 ВОСКРЕСНУТЬ</button>
        
        <div id="shopContainer" style="margin-top: 10px;"></div>
        <button class="btn-ui" style="width: 100%; margin-top: 15px; background: #333;" onclick="exitGame()">🏃 В МЕНЮ</button>
    </div>
</div>

<script>
    const HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

    const charData = {
        epstein: { name:"Эпштейн", rarity: "common", cost:0, hp:3, coins:0, mult:1, desc: "Обычный владелец" },
        gaben: { name:"Габен", rarity: "rare", cost:50, hp:3, coins:0, mult:1.2, desc: "Редкий: +2🪙 за урон" },
        kuplinov: { name:"Куплинов", rarity: "rare", cost:50, hp:4, coins:0, mult:1.2, desc: "Редкий: Запас майонеза" },
        biden: { name:"Байден", rarity: "epic", cost:150, hp:7, coins:5, mult:1.5, desc: "Эпик: Очень живучий" },
        trump: { name:"Трамп", rarity: "epic", cost:150, hp:5, coins:15, mult:1.5, desc: "Эпик: Скидки 30%" },
        musk: { name:"Маск", rarity: "legendary", cost:500, hp:12, coins:50, mult:2, desc: "ЛЕГЕНДА: Богатейший" },
        bandera: { name:"Бандера", rarity: "legendary", cost:500, hp:5, coins:10, mult:4, desc: "ЛЕГЕНДА: Игнор Зели" },
        gabenMother: { name:"Мать Габена", rarity: "legendary", cost:500, hp:15, coins:0, mult:2, desc: "ЛЕГЕНДА: Макс. ХП" }
    };

    let pState = { lvl: 1, xp: 0, gems: 0, unlocked: ['epstein'], wallets: {}, buffs: { hp: 0, coin: 0 } };
    let cur = { id: null, hp: 0, coins: 0, active: false, mayon: 0 };

    let clicks = 0;
    document.getElementById('secretTrigger').onclick = () => {
        clicks++; if(clicks >= 5) { document.getElementById('cheatConsole').classList.toggle('hidden'); clicks = 0; }
        setTimeout(() => clicks = 0, 2000);
    };

    async function checkCheatCode() {
        const input = document.getElementById('cheatCodeInput').value;
        const msgUint8 = new TextEncoder().encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        if(hashHex === HASH) {
            document.getElementById('codeEntry').classList.add('hidden');
            document.getElementById('cheatMenu').classList.remove('hidden');
        } else alert("WRONG CODE");
    }

    function addCheat(t) {
        if(t==='gem') pState.gems+=1000; if(t==='lvl') pState.lvl+=50;
        if(t==='unlock') pState.unlocked=Object.keys(charData);
        if(t==='god') { pState.buffs.hp+=999; pState.buffs.coin+=999; }
        save(); updateUI(); renderList();
    }

    function save() { localStorage.setItem('epstein_rarity_v1', JSON.stringify(pState)); }
    function load() {
        const d = localStorage.getItem('epstein_rarity_v1');
        if(d) pState = JSON.parse(d);
        updateUI(); renderList();
    }

    function updateUI() {
        document.getElementById('playerLvl').innerText = pState.lvl;
        document.getElementById('playerGems').innerText = pState.gems;
        document.getElementById('bHP').innerText = pState.buffs.hp;
        document.getElementById('bCoin').innerText = pState.buffs.coin;
    }

    function renderList() {
        const container = document.getElementById('charList'); container.innerHTML = '';
        for(let id in charData) {
            const c = charData[id]; const isL = !pState.unlocked.includes(id);
            const d = document.createElement('div'); 
            d.className = `char-btn rarity-${c.rarity} ${isL ? 'locked' : ''}`;
            d.innerHTML = `<div><b>${c.name}</b> [${c.rarity.toUpperCase()}]<br><small style="color:#aaa">${c.desc}</small></div>
                ${isL ? `<div class="lock-badge" onclick="event.stopPropagation(); unlock('${id}')">🔓 ${c.cost}💎</div>` : ''}`;
            if(!isL) d.onclick = () => start(id);
            container.appendChild(d);
        }
    }

    function unlock(id) { if(pState.gems >= charData[id].cost) { pState.gems -= charData[id].cost; pState.unlocked.push(id); save(); updateUI(); renderList(); } }
    function buyBuff(t) { if(pState.lvl > 1) { pState.lvl--; pState.buffs[t]++; save(); updateUI(); } }

    function start(id) {
        const c = charData[id];
        cur = { id, hp: c.hp + pState.buffs.hp, coins: (pState.wallets[id] || c.coins) + pState.buffs.coin, active: true, mayon: 0 };
        document.getElementById('characterSelect').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        document.getElementById('actionControls').classList.remove('hidden');
        document.getElementById('resurrectBtn').classList.add('hidden');
        gameUI(); renderShop(); log("Тактика на игру?");
    }

    function resurrect() { start(cur.id); }

    function gameUI() {
        document.getElementById('livesDisplay').innerText = cur.hp > 0 ? '❤️ x' + cur.hp : '💀';
        document.getElementById('coinsValue').innerText = Math.floor(cur.coins);
        pState.wallets[cur.id] = cur.coins; save();
    }

    function log(m, c="#e2ffd6") { const e = document.getElementById('eventMessage'); e.innerHTML = m; e.style.color = c; }

    function playTurn(mode) {
        if(!cur.active) return;
        let xp = 25; let coinMult = 1; let risk = 1;
        if(mode === 'risk') { xp = 50; coinMult = 2; risk = 2; }
        if(mode === 'safe') { xp = 10; coinMult = 0.5; risk = 0; }
        pState.xp += xp; if(pState.xp >= 100) { pState.xp = 0; pState.lvl++; pState.gems += 15; updateUI(); }
        
        const r = Math.random() * 100;
        if(r < 30) { 
            let g = Math.ceil(5 * (charData[cur.id].mult || 1) * coinMult); 
            cur.coins += g; log(`🍖 Съел! +🪙${g} монет.`); 
        } 
        else if(r < 40) { cur.coins += 20; log("✉️ ОСТРОВ! +20 монет!", "#ffd966"); }
        else if(r < 55) { if(risk > 0) dmg(3 * risk, "🚨 ТЕСАК!"); else log("🛡️ ЗАЩИТА: Тесак мимо."); }
        else if(r < 70) { cur.hp++; log("🥒 ОГУЗОК! +1 ❤️"); }
        else if(r < 85) { if(risk > 0) dmg(2 * risk, "🐻 ПУТИН!"); else log("🛡️ ЗАЩИТА: Скрылся от Путина."); }
        else { 
            if(cur.id === 'bandera') log("🇺🇦 ЗЕЛЯ: Привет!"); 
            else if(risk > 0) dmg(4 * risk, "🇺🇦 ЗЕЛЕНСКИЙ!");
            else log("🛡️ ЗАЩИТА: Зеля не заметил.");
        }
        if(cur.hp <= 0) { 
            cur.active = false; log("💀 КОНЕЦ", "#f55"); 
            document.getElementById('actionControls').classList.add('hidden');
            document.getElementById('resurrectBtn').classList.remove('hidden');
        }
        gameUI();
    }

    function dmg(d, res) {
        if(cur.mayon > 0) { cur.mayon--; log("🍯 МАЙОНЕЗ! <br> Спас от удара."); return; }
        cur.hp -= d; if(cur.id === 'gaben') cur.coins += 2; log(`${res} <br> -${d} ❤️`, "#fba");
    }

    function renderShop() {
        const s = document.getElementById('shopContainer'); s.innerHTML = '';
        const disc = charData[cur.id].rarity === 'epic' && cur.id === 'trump' ? 0.3 : 0;
        const b = (n, c, f) => {
            const btn = document.createElement('button'); const pr = Math.floor(c * (1 - disc));
            btn.className = 'btn-ui'; btn.innerText = `${n} (${pr}🪙)`;
            btn.onclick = () => { if(cur.coins >= pr) { cur.coins -= pr; f(); gameUI(); } };
            s.appendChild(btn);
        };
        b("+1 HP", 15, () => cur.hp++);
        if(cur.id === 'kuplinov') b("МАЙОНЕЗ", 40, () => cur.mayon += 5);
    }

    function exitGame() { document.getElementById('characterSelect').classList.remove('hidden'); document.getElementById('gameArea').classList.add('hidden'); }
    load();
</script>
</body>
</html>
