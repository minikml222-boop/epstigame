<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЭПШТЕЙН v4.8.1 · FIX</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; transition: 0.4s; }
        body { background: #03060c; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; margin: 0; padding: 10px; color: white; overflow: hidden; }
        .game-container { background: #1a1f2a; border-radius: 30px; max-width: 420px; width: 100%; padding: 15px; border: 3px solid #7a6a3a; position: relative; }
        .player-stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .characters { display: flex; flex-direction: column; gap: 8px; max-height: 55vh; overflow-y: auto; padding: 5px; }
        .char-btn { background: #2a3241; border: 2px solid #444; border-radius: 15px; padding: 12px; cursor: pointer; border-left: 8px solid; }
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .act-btn { border: none; font-size: 1rem; padding: 14px; border-radius: 40px; color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-normal { background: linear-gradient(#b34e2e, #5a1e0c); }
        .btn-ui { background: rgba(255,255,255,0.1); border: 1px solid #666; padding: 8px; border-radius: 10px; color: white; cursor: pointer; }
        .hidden { display: none !important; }
        input#debugCode, input#unbanCode { background: #000; border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; border-radius: 10px; text-align: center; width: 100%; }
        
        /* ЭКРАН БАНА */
        #banScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #900; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="banScreen" class="hidden">
    <h1 style="font-size: 3rem; margin: 0;">BANNED</h1>
    <p style="margin: 20px 0;">Ваша учетная запись заблокирована за нарушение протокола 676767.</p>
    <div style="width: 100%; max-width: 300px;">
        <input type="text" id="unbanCode" placeholder="КОД РАЗБЛОКИРОВКИ"><br><br>
        <button class="act-btn btn-normal" style="width:100%" onclick="checkUnban()">СНЯТЬ БАН</button>
    </div>
</div>

<div id="mainBox" class="game-container">
    <div class="player-stats">
        <div>💎 <span id="playerGems">0</span></div>
        <div id="locName" style="font-weight:bold; color:#00ffcc; cursor:pointer;" onclick="toggleDebug()">МЕНЮ (КОНСОЛЬ)</div>
        <div>LVL: 🆙</div>
    </div>

    <div id="characterSelect">
        <div class="characters" id="charList"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <div id="livesDisplay">❤️ 0</div>
            <div id="coinsValue">🪙 0</div>
        </div>
        <div id="eventMessage" style="background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; margin-bottom:10px; text-align:center;">---</div>
        <div class="action-grid">
            <button class="act-btn btn-normal" onclick="playTurn()">ХОД</button>
            <button class="btn-ui" onclick="location.reload()">В МЕНЮ</button>
        </div>
    </div>
</div>

<div id="debugPanel" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; background:#1a1f2a; padding:30px; border-radius:20px; border:2px solid #00ffcc; width:85%;">
        <h3>ENGINEER CONSOLE</h3>
        <input type="text" id="debugCode" placeholder="ВВЕДИТЕ КОД"><br><br>
        <button class="act-btn btn-normal" style="width:100%;" onclick="verifyCode()">EXECUTE</button>
        <button class="btn-ui" style="display:block; width:100%; margin-top:10px;" onclick="toggleDebug()">CLOSE</button>
    </div>
</div>

<script>
    const charData = {
        epstein: { n: "Эпштейн", hp: 5, c: "#ffd966" },
        bandera: { n: "Бандера", hp: 100, c: "#000", secret: true },
        framekid: { n: "framekid", hp: 1e9, c: "#00ffcc", secret: true, god: true, coins: 1e7 },
        quadors: { n: "quadors", hp: 1, c: "#ff00ff", secret: true, god: true }
    };

    let pState = { gems: 0, unlocked: ['epstein'], banned: false };
    let cur = { active: false, god: false, hp: 0, coins: 0 };

    function save() { localStorage.setItem('ep_4.8.1', JSON.stringify(pState)); }
    function load() {
        const d = localStorage.getItem('ep_4.8.1');
        if(d) pState = JSON.parse(d);
        if(pState.banned) document.getElementById('banScreen').classList.remove('hidden');
        document.getElementById('playerGems').innerText = pState.gems;
        renderList();
    }

    function renderList() {
        const list = document.getElementById('charList'); list.innerHTML = '';
        for(let id in charData) {
            const c = charData[id]; 
            if(c.secret && !pState.unlocked.includes(id)) continue;
            const d = document.createElement('div'); d.className = 'char-btn';
            d.style.borderColor = c.c;
            d.innerHTML = `<b>${c.n}</b> | HP: ${c.god ? '∞' : c.hp}`;
            d.onclick = () => start(id);
            list.appendChild(d);
        }
    }

    function verifyCode() {
        const code = document.getElementById('debugCode').value.trim();
        if(code === '676767') {
            pState.banned = true;
            save();
            document.getElementById('banScreen').classList.remove('hidden');
            toggleDebug();
        } else if(code === '886767') { unlock('framekid'); }
        else if(code === '1488') { unlock('bandera'); }
        else if(code === 'miside') { unlock('quadors'); }
        else if(code === '1337') { pState.gems += 500; save(); load(); }
        
        document.getElementById('debugCode').value = '';
    }

    function unlock(id) {
        if(!pState.unlocked.includes(id)) {
            pState.unlocked.push(id);
            save(); load();
            alert("РАЗБЛОКИРОВАНО: " + id);
        }
    }

    function checkUnban() {
        if(document.getElementById('unbanCode').value.trim() === '8814') {
            pState.banned = false;
            save();
            document.getElementById('banScreen').classList.add('hidden');
        } else {
            alert("КОД НЕВЕРЕН");
        }
    }

    function start(id) {
        const c = charData[id];
        cur = { active: true, god: c.god || false, hp: c.hp, coins: c.coins || 0 };
        document.getElementById('characterSelect').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        gameUI();
    }

    function playTurn() {
        if(Math.random() < 0.5) {
            cur.coins += 50; document.getElementById('eventMessage').innerText = "💰 +50 монет";
        } else {
            if(!cur.god) {
                cur.hp -= 1; document.getElementById('eventMessage').innerText = "💥 -1 HP";
            } else {
                document.getElementById('eventMessage').innerText = "🛡️ IMMUNE";
            }
        }
        if(cur.hp <= 0 && !cur.god) { alert("Game Over"); location.reload(); }
        gameUI();
    }

    function gameUI() {
        document.getElementById('livesDisplay').innerText = "❤️ " + (cur.god && cur.id !== 'framekid' ? "∞" : cur.hp);
        document.getElementById('coinsValue').innerText = "🪙 " + cur.coins;
    }

    function toggleDebug() { document.getElementById('debugPanel').classList.toggle('hidden'); }
    load();
</script>
</body>
</html>
